<main class="main">

    <h2 class="chapterlabel">Psalm 117</h2>
    <p class="q"><span class="verse" id="v1">1</span> Praise Yahweh, all you nations!</p>
    <p class="q2">Extol him, all you peoples!</p>
    <p class="q"><span class="verse" id="v2">2</span> For his loving kindness is great toward us.</p>
    <p class="q2">Yahweh’s faithfulness endures forever.</p>
    <p class="q">Praise Yah!</p>
